<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C_Card</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="theme-color" content="#0f1117">
<meta name="background-color" content="#0f1117">

<style>


*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d2e;--border:#2a2d3e;
  --purple:#6c63ff;--purple-light:#a78bfa;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
  --text:#e0e0e0;--muted:#888;--radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;max-width:420px;margin:0 auto}
.screen.active{display:flex}
.status-bar{display:flex;justify-content:space-between;padding:8px 16px 4px;font-size:11px;color:var(--muted)}
.header{padding:8px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0}
.scroll-content{flex:1;overflow-y:auto;padding-bottom:80px}
.cards-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.cards-scroll::-webkit-scrollbar{display:none}
.summary-card{min-width:138px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 13px 11px;flex-shrink:0}
.summary-card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.summary-card .val{font-size:20px;font-weight:700;line-height:1}
.summary-card .sub{font-size:10px;color:var(--muted);margin-top:3px}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-blue{color:var(--blue)}.c-purple{color:var(--purple-light)}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:14px 16px 8px}
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px;cursor:pointer;transition:border-color .2s}
.month-card:hover{border-color:var(--purple)}
.month-card.current{border-color:var(--blue)}
.month-card.paid{border-color:var(--green);opacity:.7}
.month-card.empty{opacity:.35}
.month-card .mn{font-size:12px;font-weight:600;margin-bottom:3px}
.month-card .mv{font-size:14px;font-weight:700}
.month-card .md{font-size:10px;color:var(--muted);margin-top:2px}
.paid-badge{display:inline-block;background:#4ade8022;color:var(--green);font-size:9px;padding:1px 5px;border-radius:4px;margin-top:2px}
.fab{position:fixed;bottom:24px;right:50%;transform:translateX(210px);width:52px;height:52px;border-radius:50%;background:var(--purple);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px #6c63ff55;z-index:100;border:none}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 12px;margin-top:auto;overflow-x:auto;scrollbar-width:none}
.bottom-nav::-webkit-scrollbar{display:none}
.nav-item{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);font-size:9px;padding:4px 2px;transition:color .2s;white-space:nowrap}
.nav-item.active,.nav-item:hover{color:var(--purple-light)}
.nav-icon{font-size:18px;line-height:1}
.overlay{display:none;position:fixed;inset:0;background:#00000099;z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:0 0 32px;max-height:92vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 14px}
.sheet h2{font-size:15px;font-weight:600;padding:0 20px 14px}
.form-group{padding:0 20px;margin-bottom:12px}
.form-group label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-size:14px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--purple)}
.parcelas-row{display:flex;gap:5px;flex-wrap:wrap;padding:0 20px;margin-bottom:12px}
.parc-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);padding:6px 10px;cursor:pointer;font-size:12px;transition:all .15s}
.parc-btn.sel{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:600}
.preview-box{margin:0 20px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:11px;font-size:12px;color:var(--muted);line-height:1.8}
.preview-box .pv-row{display:flex;justify-content:space-between}
.preview-box .pv-val{color:var(--text);font-weight:600}
.add-btn{margin:0 20px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius);width:calc(100% - 40px);padding:13px;font-size:15px;font-weight:600;cursor:pointer}
.hist-filters{display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
.hist-filters::-webkit-scrollbar{display:none}
.filter-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.filter-chip.active{background:var(--purple);border-color:var(--purple);color:#fff}
.sort-bar{display:flex;gap:4px;overflow-x:auto;padding:0 16px 8px;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:10px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.sort-btn.active{border-color:var(--purple-light);color:var(--purple-light)}
.hist-item{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px}
.hi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.hi-name{font-size:14px;font-weight:600}
.hi-val{font-size:14px;font-weight:700;color:var(--purple-light)}
.hi-meta{display:flex;gap:6px;font-size:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600}
.badge-pago{background:#4ade8022;color:var(--green)}
.badge-futuro{background:#6c63ff22;color:var(--purple-light)}
.badge-vencido{background:#f8717122;color:var(--red)}
.badge-info{background:#60a5fa22;color:var(--blue)}
.depo-row{display:flex;align-items:center;gap:7px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.depo-check{width:15px;height:15px;accent-color:var(--purple);cursor:pointer;flex-shrink:0}
.depo-label{font-size:10px;color:var(--muted)}
.settings-list{padding:0 16px}
.settings-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.settings-item{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-item .hint{font-size:10px;color:var(--muted);margin-top:2px}
.settings-item input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:5px 9px;font-size:13px;width:85px;text-align:right;outline:none}
.settings-item input:focus{border-color:var(--purple)}
.warn-box{background:#fbbf2411;border:1px solid #fbbf2444;border-radius:var(--radius);padding:9px 13px;font-size:11px;color:var(--yellow);margin-bottom:12px}
.card-color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.card-strip{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin:0 16px 8px;cursor:pointer;transition:border-color .2s}
.card-strip:hover{border-color:var(--purple-light)}
.cs-name{font-size:13px;font-weight:600;flex:1}
.cs-val{font-size:14px;font-weight:700}
.cs-sub{font-size:10px;color:var(--muted)}
.confirm-overlay{display:none;position:fixed;inset:0;background:#00000099;z-index:300;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-width:300px;width:90%;text-align:center}
.confirm-box h3{font-size:15px;margin-bottom:8px}
.confirm-box p{font-size:12px;color:var(--muted);margin-bottom:16px}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600}
.btn-cancel{background:var(--bg);color:var(--text)}
.btn-confirm{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-danger{background:#f8717133;color:var(--red);border-color:var(--red)}
.color-row{display:flex;gap:8px;padding:0 20px;margin-bottom:12px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.color-opt.sel{border-color:#fff}
</style>
</head>
<body>

<!-- ===== SCREEN: DASHBOARD GERAL ===== -->
<div class="screen active" id="screen-home">
  <div class="status-bar"><span>9:41</span><span>◉◉◉◉ 100%</span></div>
  <div class="header">
    <div><h1>💳 Parceladas</h1><div style="font-size:11px;color:var(--muted)">Visão geral · Mai 2026</div></div>
    <div class="icon-btn" onclick="goTo('screen-settings',null)">⚙️</div>
  </div>
  <div class="scroll-content">
    <div class="cards-scroll" id="global-summary-cards"></div>
    <div class="section-title">Por cartão</div>
    <div id="cards-strips"></div>
    <div class="section-title">Faturas consolidadas 2026</div>
    <div class="months-grid" id="global-months-grid"></div>
  </div>
  <div class="bottom-nav" id="bottom-nav-home"></div>
</div>

<!-- ===== SCREEN: CARTÃO INDIVIDUAL ===== -->
<div class="screen" id="screen-card">
  <div class="status-bar"><span>9:41</span><span>◉◉◉◉ 100%</span></div>
  <div class="header">
    <div class="icon-btn" onclick="goTo('screen-home',null)">←</div>
    <div style="text-align:center"><h1 id="card-screen-title" style="font-size:16px"></h1><div id="card-screen-sub" style="font-size:10px;color:var(--muted)"></div></div>
    <div class="icon-btn" onclick="goTo('screen-settings', currentCard)">⚙️</div>
  </div>
  <div class="scroll-content">
    <div class="cards-scroll" id="card-summary-cards"></div>
    <div class="section-title">Faturas 2026</div>
    <div class="months-grid" id="card-months-grid"></div>
  </div>
  <button class="fab" onclick="openSheet()">＋</button>
  <div class="bottom-nav" id="bottom-nav-card"></div>
</div>

<!-- ===== SCREEN: HISTÓRICO ===== -->
<div class="screen" id="screen-hist">
  <div class="status-bar"><span>9:41</span><span>◉◉◉◉ 100%</span></div>
  <div class="header">
    <div class="icon-btn" id="hist-back-btn">←</div>
    <h1 style="font-size:16px" id="hist-title">Histórico</h1>
    <div style="width:36px"></div>
  </div>
  <div class="hist-filters" id="hist-filters"></div>
  <div class="sort-bar">
    <span style="font-size:10px;color:var(--muted);align-self:center;margin-right:2px">Ordenar:</span>
    <div class="sort-btn active" id="sort-desc" onclick="setSort('desc')">Descrição <span id="arr-desc">↕</span></div>
    <div class="sort-btn" id="sort-val" onclick="setSort('val')">Valor <span id="arr-val">↕</span></div>
    <div class="sort-btn" id="sort-parc" onclick="setSort('parc')">Parcela <span id="arr-parc">↕</span></div>
    <div class="sort-btn" id="sort-data" onclick="setSort('data')">Data <span id="arr-data">↕</span></div>
    <div class="sort-btn" id="sort-fat" onclick="setSort('fat')">Vencimento <span id="arr-fat">↕</span></div>
  </div>
  <div class="scroll-content" id="hist-list"></div>
  <div class="bottom-nav" id="bottom-nav-hist"></div>
</div>

<!-- ===== SCREEN: CONFIGURAÇÕES ===== -->
<div class="screen" id="screen-settings">
  <div class="status-bar"><span>9:41</span><span>◉◉◉◉ 100%</span></div>
  <div class="header">
    <div class="icon-btn" id="settings-back-btn">←</div>
    <h1 style="font-size:16px" id="settings-title">Configurações</h1>
    <div style="width:36px"></div>
  </div>
  <div class="scroll-content">
    <div class="settings-list" id="settings-content"></div>
  </div>
  <div class="bottom-nav" id="bottom-nav-settings"></div>
</div>

<!-- ===== BOTTOM SHEET: Nova Compra ===== -->
<div class="overlay" id="overlay" onclick="closeSheetOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Nova Compra</h2>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="f-desc" placeholder="Ex: Tênis Nike..." list="sugestoes" autocomplete="off">
      <datalist id="sugestoes"></datalist>
    </div>
    <div class="form-group">
      <label>Valor Total (R$)</label>
      <input type="number" id="f-valor" placeholder="0,00" min="0" step="0.01" oninput="updatePreview()">
    </div>
    <div class="form-group"><label>Parcelas</label></div>
    <div class="parcelas-row" id="parcelas-row"></div>
    <div class="form-group">
      <label>Data da Compra</label>
      <input type="date" id="f-data" oninput="updatePreview()">
    </div>
    <div class="preview-box" id="preview-box" style="display:none"></div>
    <button class="add-btn" onclick="addCompra()">Adicionar</button>
  </div>
</div>

<!-- ===== OVERLAY: Novo Cartão ===== -->
<div class="overlay" id="overlay-newcard" onclick="closeNewCardOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Novo Cartão</h2>
    <div class="form-group">
      <label>Nome do Cartão</label>
      <input type="text" id="nc-nome" placeholder="Ex: Nubank, Inter, Itaú...">
    </div>
    <div class="form-group"><label>Cor</label></div>
    <div class="color-row" id="color-row"></div>
    <div class="form-group">
      <label>Dia de Fechamento</label>
      <input type="number" id="nc-fech" min="1" max="28" value="5">
    </div>
    <div class="form-group">
      <label>Dia de Vencimento</label>
      <input type="number" id="nc-venc" min="1" max="28" value="10">
    </div>
    <div class="form-group">
      <label>Rendimento % a.m.</label>
      <input type="number" id="nc-rend" min="0" max="5" step="0.01" value="1.0">
    </div>
    <button class="add-btn" onclick="saveNewCard()">Criar Cartão</button>
  </div>
</div>

<!-- ===== CONFIRM DIALOG ===== -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title"></h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button id="confirm-ok-btn" class="btn-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ==================== STATE ====================
const COLORS = ['#6c63ff','#f87171','#4ade80','#60a5fa','#fbbf24','#f472b6','#34d399','#fb923c'];
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const TODAY = new Date(2026,4,13);

let cards = [];
let currentCard = null;
let histContext = null;
let selectedParcelas = 1;
let selectedColor = COLORS[0];
let sortKey='desc', sortAsc=true;
let filterMonth='all', filterStatus='all';

function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function fmt(v){return'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear()}
function toISO(d){return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')}
function getMonthKey(d){return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')}

// ==================== PERSISTÊNCIA ====================
function saveData(){
  const payload = cards.map(card => ({
    id: card.id,
    nome: card.nome,
    cor: card.cor,
    fechamento: card.fechamento,
    vencimento: card.vencimento,
    rendimento: card.rendimento,
    paidMonths: [...card.paidMonths],
    purchases: card.purchases.map(p => ({
      id: p.id,
      descricao: p.descricao,
      valorTotal: p.valorTotal,
      dataCompra: toISO(p.dataCompra),
      parcelas: p.parcelas.map(pa => ({
        num: pa.num,
        total: pa.total,
        valorParcela: pa.valorParcela,
        vencimento: toISO(pa.vencimento),
        depositado: pa.depositado,
        depositoData: pa.depositoData,
        depositoDataISO: pa.depositoDataISO
      }))
    }))
  }));
  localStorage.setItem('parceladas_v1', JSON.stringify(payload));
}

function loadData(){
  const raw = localStorage.getItem('parceladas_v1');
  if(!raw) return false;
  try {
    const payload = JSON.parse(raw);
    cards = payload.map(c => ({
      id: c.id,
      nome: c.nome,
      cor: c.cor,
      fechamento: c.fechamento,
      vencimento: c.vencimento,
      rendimento: c.rendimento,
      paidMonths: new Set(c.paidMonths),
      purchases: c.purchases.map(p => ({
        id: p.id,
        descricao: p.descricao,
        valorTotal: p.valorTotal,
        dataCompra: new Date(p.dataCompra + 'T12:00:00'),
        parcelas: p.parcelas.map(pa => ({
          num: pa.num,
          total: pa.total,
          valorParcela: pa.valorParcela,
          vencimento: new Date(pa.vencimento + 'T12:00:00'),
          depositado: pa.depositado,
          depositoData: pa.depositoData,
          depositoDataISO: pa.depositoDataISO
        }))
      }))
    }));
    return true;
  } catch(e) {
    console.error('Erro ao carregar dados:', e);
    return false;
  }
}

function calcVencimento(dataCompra, parcelaNum, fech, venc){
  const d = new Date(dataCompra);
  let mes=d.getMonth(), ano=d.getFullYear();
  if(d.getDate()>fech) mes++;
  mes+=(parcelaNum-1);
  while(mes>11){mes-=12;ano++;}
  return new Date(ano,mes,venc);
}

function recalcCard(card){
  card.purchases.forEach(p=>{
    p.parcelas.forEach((pa,i)=>{
      pa.vencimento=calcVencimento(p.dataCompra,i+1,card.fechamento,card.vencimento);
    });
  });
}

function calcRendimento(pa, rend){
  if(!pa.depositado||!pa.depositoDataISO) return 0;
  const dep=new Date(pa.depositoDataISO+'T12:00:00');
  const meses=Math.max(0,(TODAY-dep)/(1000*60*60*24*30));
  return pa.valorParcela*(Math.pow(1+rend/100,meses)-1);
}

// ==================== ROUTING ====================
function goTo(screenId, cardId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  if(screenId==='screen-home') renderGlobal();
  if(screenId==='screen-card'){currentCard=cardId;renderCardScreen(cardId);}
  if(screenId==='screen-hist'){histContext=cardId;renderHistorico();}
  if(screenId==='screen-settings') renderSettings(cardId);
  window.scrollTo(0,0);
}

// ==================== BOTTOM NAV ====================
function buildNav(containerId, activeKey, cardId){
  const c=document.getElementById(containerId);
  c.innerHTML='';
  const home=navItem('🏠','Geral',activeKey==='home',()=>goTo('screen-home',null));
  c.appendChild(home);
  cards.forEach(card=>{
    const isActive = activeKey==='card' && currentCard===card.id;
    const abbr=card.nome.slice(0,2).toUpperCase();
    const item=navItemCard(abbr,card.nome,card.cor,isActive,()=>goTo('screen-card',card.id));
    c.appendChild(item);
  });
  const hist=navItem('📋','Histórico',activeKey==='hist',()=>goTo('screen-hist',cardId));
  c.appendChild(hist);
  const cfg=navItem('⚙️','Config',activeKey==='settings',()=>goTo('screen-settings',cardId));
  c.appendChild(cfg);
}

function navItem(icon,label,active,fn){
  const d=document.createElement('div');
  d.className='nav-item'+(active?' active':'');
  d.innerHTML=`<span class="nav-icon">${icon}</span>${label}`;
  d.onclick=fn; return d;
}

function navItemCard(abbr,label,cor,active,fn){

    total+=s.total;dep+=s.dep;rend+=s.rend;semDep+=s.semDep;
  });
  const saldo=dep+rend-total;
  const sc=document.getElementById('global-summary-cards');
  sc.innerHTML=summaryCardsHTML(total,dep,rend,saldo,semDep);

  const strips=document.getElementById('cards-strips');
  strips.innerHTML='';
  cards.forEach(card=>{
    const s=calcSummary(card);
    const sld=s.dep+s.rend-s.total;

    d.className='card-strip';
    d.onclick=()=>goTo('screen-card',card.id);
    d.innerHTML=`
      <span class="card-color-dot" style="background:${card.cor}"></span>
      <div style="flex:1">
        <div class="cs-name">${card.nome}</div>
        <div class="cs-sub">Fech. dia ${card.fechamento} · Venc. dia ${card.vencimento}</div>
      </div>

        <div class="cs-val ${sld>=0?'c-green':'c-red'}">${fmt(Math.abs(sld))}</div>
        <div class="cs-sub">${sld>=0?'✅ positivo':'⚠️ negativo'}</div>
      </div>
      <span style="color:var(--muted);margin-left:6px">›</span>

  }

function summaryCardsHTML(total,dep,rend,saldo,semDep){
  return `
    <div class="summary-card"><div class="lbl">Total Compras</div><div class="val c-red">${fmt(total)}</div><div class="sub">parcelas abertas</div></div>
    <div class="summary-card"><div class="lbl">Depositado</div><div class="val c-blue">${fmt(dep)}</div><div class="sub">na reserva</div></div>
    <div class="summary-card"><div class="lbl">Rendimento</div><div class="val c-green">${fmt(rend)}</div><div class="sub">acumulado</div></div>
    <div class="summary-card"><div class="lbl">Saldo Líquido</div><div class="val ${saldo>=0?'c-green':'c-red'}">${fmt(Math.abs(saldo))}</div><div class="sub">${saldo>=0?'✅ positivo':'⚠️ negativo'}</div></div>
    <div class="summary-card"><div class="lbl">Sem Depósito</div><div class="val c-yellow">${fmt(semDep)}</div><div class="sub">a reservar</div></div>
  `;
}

function calcSummary(card){
  let total=0,dep=0,rend=0,semDep=0;
  card.purchases.forEach(p=>{
    p.parcelas.forEach(pa=>{
      const mk=getMonthKey(pa.vencimento);
      if(card.paidMonths.has(mk)) return;
      total+=pa.valorParcela;
      if(pa.depositado){dep+=pa.valorParcela;rend+=calcRendimento(pa,card.rendimento);}
      else semDep+=pa.valorParcela;
    });
  });
  return {total,dep,rend,semDep};
}

// ==================== CARD SCREEN ====================
function renderCardScreen(cardId){
  const card=cards.find(c=>c.id===cardId);
  if(!card) return;
  buildNav('bottom-nav-card','card',cardId);
  document.getElementById('card-screen-title').textContent='💳 '+card.nome;

  const s=calcSummary(card);
  document.getElementById('card-summary-cards').innerHTML=summaryCardsHTML(s.total,s.dep,s.rend,s.dep+s.rend-s.total,s.semDep);

// ==================== MONTHS GRID ====================
function renderMonthsGrid(gridId, cardId){
  const grid=document.getElementById(gridId);
  grid.innerHTML='';
  const year=2026;
  for(let m=0;m<12;m++){
    let total=0;
    if(cardId){
      const card=cards.find(c=>c.id===cardId);
      if(card){
        card.purchases.forEach(p=>p.parcelas.forEach(pa=>{
          if(pa.vencimento.getFullYear()===year&&pa.vencimento.getMonth()===m) total+=pa.valorParcela;
        }));
      }
    } else {
      cards.forEach(card=>{
        card.purchases.forEach(p=>p.parcelas.forEach(pa=>{
          if(pa.vencimento.getFullYear()===year&&pa.vencimento.getMonth()===m) total+=pa.valorParcela;
        }));
      });
    }

    let isPaid=false;
    if(cardId){
      const card=cards.find(c=>c.id===cardId);
      const mk=year+'-'+(m+1).toString().padStart(2,'0');
      if(card) isPaid=card.paidMonths.has(mk);
    } else {
      isPaid=cards.length>0&&cards.every(card=>card.paidMonths.has(year+'-'+(m+1).toString().padStart(2,'0')));
    }

    const isCurrent=(m===4);
    const vencDia = cardId?(cards.find(c=>c.id===cardId)||{vencimento:10}).vencimento:10;
    const vencDate=new Date(year,m,vencDia);

    const div=document.createElement('div');
    div.className='month-card'+(isCurrent?' current':'')+(isPaid?' paid':'')+(total===0?' empty':'');
    div.innerHTML=`
      <div class="mn">${MONTHS[m]}</div>
      <div class="mv ${total>0?(isPaid?'c-green':'c-purple'):''}">${total>0?fmt(total):'—'}</div>
      <div class="md">${total>0?'vence '+fmtDate(vencDate):''}</div>
      ${isPaid?'<span class="paid-badge">✓ paga</span>':''}
    `;
    div.onclick=()=>togglePaid(cardId, year+'-'+(m+1).toString().padStart(2,'0'));
    grid.appendChild(div);
  }
}

function togglePaid(cardId, mk){
  if(cardId){
    const card=cards.find(c=>c.id===cardId);
    if(!card) return;
    card.paidMonths.has(mk)?card.paidMonths.delete(mk):card.paidMonths.add(mk);
    renderCardScreen(cardId);
  } else {
    const allPaid=cards.every(c=>c.paidMonths.has(mk));
    cards.forEach(c=>allPaid?c.paidMonths.delete(mk):c.paidMonths.add(mk));
    renderGlobal();
  }
  saveData();
}

function closeSheetOutside(e){if(e.target.id==='overlay') document.getElementById('overlay').classList.remove('open');}

function renderParcelasRow(){
  const row=document.getElementById('parcelas-row');
  row.innerHTML='';
  for(let n=1;n<=12;n++){
    const b=document.createElement('div');
    b.className='parc-btn'+(selectedParcelas===n?' sel':'');
    b.textContent=n+'x';
    b.onclick=()=>{selectedParcelas=n;renderParcelasRow();updatePreview();};
    row.appendChild(b);
  }

function updatePreview(){
  const val=parseFloat(document.getElementById('f-valor').value)||0;
  const dataStr=document.getElementById('f-data').value;
  const box=document.getElementById('preview-box');
  if(!val||!dataStr){box.style.display='none';return;}
  const card=cards.find(c=>c.id===currentCard);
  if(!card){box.style.display='none';return;}
  const dataCompra=new Date(dataStr+'T12:00:00');
  const parcVal=val/selectedParcelas;
  box.style.display='block';
  let html='';
  for(let i=1;i<=Math.min(selectedParcelas,3);i++){
    const v=calcVencimento(dataCompra,i,card.fechamento,card.vencimento);
    html+=`<div class="pv-row"><span>Parcela ${i}/${selectedParcelas}</span><span class="pv-val">${fmt(parcVal)}</span></div>
    <div style="font-size:11px;color:var(--purple-light);margin-bottom:4px">→ vence ${fmtDate(v)}</div>`;
  }
  if(selectedParcelas>3) html+=`<div style="color:var(--muted);font-size:10px">...e mais ${selectedParcelas-3} parcelas</div>`;
  box.innerHTML=html;
}

function addCompra(){
  const desc=document.getElementById('f-desc').value.trim();
  const val=parseFloat(document.getElementById('f-valor').value)||0;
  const dataStr=document.getElementById('f-data').value;
  if(!desc||!val||!dataStr){alert('Preencha todos os campos!');return;}
  const card=cards.find(c=>c.id===currentCard);
  if(!card) return;
  const dataCompra=new Date(dataStr+'T12:00:00');
  const parcVal=+(val/selectedParcelas).toFixed(2);
  const parcelas=[];
  for(let i=1;i<=selectedParcelas;i++){
    parcelas.push({num:i,total:selectedParcelas,valorParcela:parcVal,
      vencimento:calcVencimento(dataCompra,i,card.fechamento,card.vencimento),
      depositado:false,depositoData:null,depositoDataISO:null});
  }
  card.purchases.push({id:uid(),descricao:desc,valorTotal:val,dataCompra,parcelas});
  document.getElementById('overlay').classList.remove('open');
  renderCardScreen(currentCard);
  saveData();
}

function renderHistorico(){
  const card=histContext?cards.find(c=>c.id===histContext):null;
  document.getElementById('hist-title').textContent='Histórico'+(card?' · '+card.nome:'');
  document.getElementById('hist-back-btn').onclick=()=>histContext?goTo('screen-card',histContext):goTo('screen-home',null);
  buildNav('bottom-nav-hist','hist',histContext);
  renderHistFilters();
  renderHistList();
}

function renderHistFilters(){
  const div=document.getElementById('hist-filters');
  div.innerHTML='';
  let allParcelas=[];
  if(histContext){
    const card=cards.find(c=>c.id===histContext);
    if(card) card.purchases.forEach(p=>p.parcelas.forEach(pa=>allParcelas.push(pa)));
  } else {
    cards.forEach(card=>card.purchases.forEach(p=>p.parcelas.forEach(pa=>allParcelas.push(pa))));
  }
  const months=['all',...[...new Set(allParcelas.map(pa=>getMonthKey(pa.vencimento)))].sort()];
  months.forEach(mk=>{
    const lbl=mk==='all'?'Todos':(()=>{const[y,m]=mk.split('-');return MONTHS[parseInt(m)-1]+'/'+y.slice(2);})();
    const c=document.createElement('div');
    c.className='filter-chip'+(filterMonth===mk?' active':'');
    c.textContent=lbl;c.onclick=()=>{filterMonth=mk;renderHistList();renderHistFilters();};
    div.appendChild(c);
  });
  ['Todos','Com depósito','Sem depósito'].forEach((s,i)=>{
    const v=['all','com','sem'][i];
    const c=document.createElement('div');
    c.className='filter-chip'+(filterStatus===v?' active':'');
    c.textContent=s;c.onclick=()=>{filterStatus=v;renderHistList();renderHistFilters();};
    div.appendChild(c);
  });
}

function setSort(key){
  sortKey===key?sortAsc=!sortAsc:(sortKey=key,sortAsc=true);
  ['desc','val','parc','data','fat'].forEach(k=>{
    document.getElementById('sort-'+k).classList.remove('active');
    document.getElementById('arr-'+k).textContent='↕';
  });
  document.getElementById('sort-'+key).classList.add('active');
  document.getElementById('arr-'+key).textContent=sortAsc?'↑':'↓';
  renderHistList();
}

function renderHistList(){
  let items=[];
  const ctxCards=histContext?cards.filter(c=>c.id===histContext):cards;
  ctxCards.forEach(card=>{
    card.purchases.forEach(p=>p.parcelas.forEach(pa=>items.push({card,p,pa})));
  });

  if(filterMonth!=='all'){
    const[fy,fm]=filterMonth.split('-');
    items=items.filter(({pa})=>pa.vencimento.getFullYear()===parseInt(fy)&&(pa.vencimento.getMonth()+1)===parseInt(fm));
  }
  if(filterStatus==='com') items=items.filter(({pa})=>pa.depositado);
  if(filterStatus==='sem') items=items.filter(({pa})=>!pa.depositado);

  items.sort((a,b)=>{
    let va,vb;
    if(sortKey==='desc'){va=a.p.descricao;vb=b.p.descricao;}
    else if(sortKey==='val'){va=a.pa.valorParcela;vb=b.pa.valorParcela;}
    else if(sortKey==='parc'){va=a.pa.num;vb=b.pa.num;}
    else if(sortKey==='data'){va=a.p.dataCompra;vb=b.p.dataCompra;}
    else if(sortKey==='fat'){va=a.pa.vencimento;vb=b.pa.vencimento;}
    return typeof va==='string'?(sortAsc?va.localeCompare(vb):vb.localeCompare(va)):(sortAsc?va-vb:vb-va);
  });

  const container=document.getElementById('hist-list');
  if(!items.length){container.innerHTML='<div style="text-align:center;color:var(--muted);padding:32px">Nenhuma parcela encontrada.</div>';return;}
  container.innerHTML='';
  items.forEach(({card,p,pa})=>{
    const mk=getMonthKey(pa.vencimento);
    const isPaidMonth=card.paidMonths.has(mk);
    const isVenc=pa.vencimento<TODAY&&!isPaidMonth;
    const status=isPaidMonth?'pago':isVenc?'vencido':'futuro';
    const bCls={pago:'badge-pago',vencido:'badge-vencido',futuro:'badge-futuro'}[status];
    const bTxt={pago:'✓ Paga',vencido:'⚠ Vencida',futuro:'Futura'}[status];
    const div=document.createElement('div');
    div.className='hist-item';
    div.innerHTML=`
      <div class="hi-top">
        <div>
          <div class="hi-name">${p.descricao}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">
            Parcela ${pa.num}/${pa.total} · ${fmtDate(p.dataCompra)}
            ${!histContext?`<span style="color:${card.cor};margin-left:4px">● ${card.nome}</span>`:''}
          </div>
        </div>
        <div style="text-align:right">
          <div class="hi-val">${fmt(pa.valorParcela)}</div>
          <div style="font-size:10px;color:var(--muted)">${fmt(p.valorTotal)} total</div>
        </div>
      </div>
      <div class="hi-meta">
        <span class="badge badge-info">Vence ${fmtDate(pa.vencimento)}</span>
        <span class="badge ${bCls}">${bTxt}</span>
      </div>
      <div class="depo-row">
        <input type="checkbox" class="depo-check" ${pa.depositado?'checked':''} onchange="toggleDeposito('${card.id}','${p.id}',${pa.num},this)">
        <span class="depo-label">${pa.depositado?'Depositado em':' Marcar depositado'}</span>
        ${pa.depositado?`<input type="date" value="${pa.depositoDataISO||''}" onchange="changeDepDate('${card.id}','${p.id}',${pa.num},this)" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--purple-light);padding:2px 5px;font-size:10px;width:125px;outline:none">`:``}
        <button onclick="deleteParcela('${card.id}','${p.id}',${pa.num})" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:15px">✕</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleDeposito(cardId,pid,num,el){
  const card=cards.find(c=>c.id===cardId);
  const p=card&&card.purchases.find(x=>x.id===pid);
  const pa=p&&p.parcelas.find(x=>x.num===num);
  if(!pa) return;
  pa.depositado=el.checked;
  pa.depositoDataISO=el.checked?toISO(TODAY):null;
  pa.depositoData=el.checked?fmtDate(TODAY):null;
  renderHistList();
  if(currentCard) renderCardScreen(currentCard); else renderGlobal();
  saveData();
}

function changeDepDate(cardId,pid,num,el){
  const card=cards.find(c=>c.id===cardId);
  const p=card&&card.purchases.find(x=>x.id===pid);
  const pa=p&&p.parcelas.find(x=>x.num===num);
  if(!pa) return;
  pa.depositoDataISO=el.value;
  const[y,m,d]=el.value.split('-');
  pa.depositoData=d+'/'+m+'/'+y;
  if(currentCard) renderCardScreen(currentCard); else renderGlobal();
  saveData();
}

function deleteParcela(cardId,pid,num){
  const card=cards.find(c=>c.id===cardId);
  const p=card&&card.purchases.find(x=>x.id===pid);
  if(!p) return;
  p.parcelas=p.parcelas.filter(x=>x.num!==num);
  if(!p.parcelas.length) card.purchases=card.purchases.filter(x=>x.id!==pid);
  renderHistList();renderHistFilters();
  if(currentCard) renderCardScreen(currentCard); else renderGlobal();
  saveData();
}

function updateCardConfig(cardId, field, val){
  const card=cards.find(c=>c.id===cardId);
  if(!card) return;
  if(field==='nome') card.nome=val;
  else if(field==='fechamento') card.fechamento=parseInt(val)||5;
  else if(field==='vencimento') card.vencimento=parseInt(val)||10;
  else if(field==='rendimento') card.rendimento=parseFloat(val)||1;
  else if(field==='cor'){card.cor=val;}
  if(field==='fechamento'||field==='vencimento') recalcCard(card);
  renderSettings(cardId);
  saveData();
}

function confirmDeleteCard(cardId){
  const card=cards.find(c=>c.id===cardId);
  showConfirm('Excluir cartão?',`"${card.nome}" e todas as suas compras serão removidos.`,()=>{
    cards=cards.filter(c=>c.id!==cardId);
    saveData();
    goTo('screen-home',null);
  },'danger');
}

  document.getElementById('nc-venc').value=10;
  document.getElementById('nc-rend').value=1.0;
  document.getElementById('overlay-newcard').classList.add('open');
}

function closeNewCardOutside(e){if(e.target.id==='overlay-newcard') document.getElementById('overlay-newcard').classList.remove('open');}

function renderColorRow(){
  const row=document.getElementById('color-row');
  row.innerHTML='';
  COLORS.forEach(cor=>{
    const d=document.createElement('div');
    d.className='color-opt'+(selectedColor===cor?' sel':'');
    d.style.background=cor;
    d.onclick=()=>{selectedColor=cor;renderColorRow();};
    row.appendChild(d);
  });
}

function saveNewCard(){
  const nome=document.getElementById('nc-nome').value.trim();
  if(!nome){alert('Informe o nome do cartão');return;}
  cards.push({
    id:uid(),nome,cor:selectedColor,
    fechamento:parseInt(document.getElementById('nc-fech').value)||5,
    vencimento:parseInt(document.getElementById('nc-venc').value)||10,
    rendimento:parseFloat(document.getElementById('nc-rend').value)||1,
    paidMonths:new Set(),purchases:[]
  });
  document.getElementById('overlay-newcard').classList.remove('open');
  renderSettings(null);
  saveData();
}

// ==================== CONFIRM DIALOG ====================
function showConfirm(title,msg,onOk,type='confirm'){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  const btn=document.getElementById('confirm-ok-btn');
  btn.className=type==='danger'?'btn-danger':'btn-confirm';
  btn.onclick=()=>{closeConfirm();onOk();};
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');}

// ==================== SAMPLE DATA ====================
function loadSample(){
  cards=[];
  const makeDate=(d,m,y)=>new Date(y,m-1,d,12);
  const cardDefs=[
    {nome:'Nubank',cor:'#6c63ff',fech:5,venc:10,rend:1.0,compras:[
      {desc:'iPhone 15 Pro',val:7200,parc:12,data:makeDate(2,1,2026)},
      {desc:'Smart TV 55"',val:3200,parc:10,data:makeDate(20,2,2026)},
      {desc:'Headset Sony',val:900,parc:6,data:makeDate(8,5,2026)},
    ]},
    {nome:'Inter',cor:'#fb923c',fech:10,venc:15,rend:0.8,compras:[
      {desc:'Tênis Nike',val:650,parc:3,data:makeDate(10,3,2026)},
      {desc:'Notebook Dell',val:5400,parc:12,data:makeDate(15,1,2026)},
      {desc:'Curso Online',val:480,parc:4,data:makeDate(1,4,2026)},
    ]},
  ];
  cardDefs.forEach(def=>{
    const card={id:uid(),nome:def.nome,cor:def.cor,fechamento:def.fech,vencimento:def.venc,rendimento:def.rend,paidMonths:new Set(),purchases:[]};
    def.compras.forEach(s=>{
      const parcVal=+(s.val/s.parc).toFixed(2);
      const parcelas=[];
      for(let i=1;i<=s.parc;i++){
        parcelas.push({num:i,total:s.parc,valorParcela:parcVal,
          vencimento:calcVencimento(s.data,i,card.fechamento,card.vencimento),
          depositado:i<=2,depositoDataISO:i<=2?'2026-05-13':null,depositoData:i<=2?'13/05/2026':null});
      }
      card.purchases.push({id:uid(),descricao:s.desc,valorTotal:s.val,dataCompra:s.data,parcelas});
    });
    card.paidMonths.add('2026-01');card.paidMonths.add('2026-02');card.paidMonths.add('2026-03');
    cards.push(card);
  });
  saveData();
  goTo('screen-home',null);
}

function clearAll(){
  showConfirm('Limpar tudo?','Todos os cartões e compras serão removidos.',()=>{
    cards=[];
    saveData();
    goTo('screen-home',null);
  },'danger');
}

// ==================== INIT ====================
renderColorRow();
renderParcelasRow();
if(!loadData()){
  loadSample();
} else {
  renderGlobal();
}
</script>
